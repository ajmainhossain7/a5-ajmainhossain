<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- <style>
        * {
            color: black;
        }
    </style> -->

</head>

<body class="bg-gray-100 min-h-screen">

    <!-- NAVBAR -->

    <nav class="bg-white shadow ">
        <div class="w-11/12 mx-auto px-6 py-3 flex flex-col sm:flex-row justify-between items-center">

            <div class="flex items-center gap-2 m-1">

                <img src="./assets/github-logo.png" class="w-7" />

                <h1 class="font-semibold">
                    GitHub Issues Tracker
                </h1>

            </div>

            <div class="flex gap-2 m-1">

                <input id="searchInput" placeholder="Search issues..."
                    class="border-1 border-solid border-gray-200 bg-white px-3 py-2 rounded w-[70%]" />

                <button onclick="searchIssues()" class="bg-[#4a00ff] text-white px-4 rounded">
                    Search
                </button>

            </div>

        </div>
    </nav>

    <!-- MAIN -->

    <div class="w-11/12 mx-auto mt-6">

        <!-- TABS -->

        <div class="flex gap-2 mb-5 bg-white p-4">

            <button id="allBtn" class="tabBtn cursor-pointer px-5 py-2 rounded bg-[#4a00ff] text-white"
                onclick="changeTab('all')">
                All
            </button>

            <button id="openBtn" class="tabBtn cursor-pointer px-5 py-2 rounded border-1 border-solid border-gray-200" onclick="changeTab('open')">
                Open
            </button>

            <button id="closedBtn" class="tabBtn cursor-pointer px-5 py-2 rounded border-1 border-solid border-gray-200" onclick="changeTab('closed')">
                Closed
            </button>

        </div>

        <!-- ISSUE HEADER -->

        <div class="bg-white rounded shadow p-4 mb-1 flex flex-col sm:flex-row justify-between">

            <div class="flex gap-3 items-center">

                <div class="text-xl">
                    <img src="./assets/Aperture.png">
                </div>

                <div>

                    <h2 id="issueCount" class="font-semibold text-black text-xl">
                        0 Issues
                    </h2>

                    <p class="text-sm text-gray-500">
                        Track and manage your project issues
                    </p>

                </div>

            </div>

            <div class="flex gap-4 text-sm mt-2">

                <span class="flex items-center gap-1 text-green-600">
                    ● Open
                </span>

                <span class="flex items-center gap-1 text-purple-600">
                    ● Closed
                </span>

            </div>

        </div>

        <!-- CARDS -->

        <div id="issuesContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 pb-6 bg-[#FBFBFB] p-4 "></div>

    </div>

    <!-- MODAL -->

    <dialog id="issueModal" class="modal">

        <div class="modal-box bg-white">

            <h3 id="modalTitle" class="font-bold text-lg mb-2"></h3>

            <div class="flex items-center gap-2 mb-3">

                <span id="modalStatus" class="px-2 py-1 text-xs rounded bg-green-100 text-green-600">
                    Open
                </span>
                <span id="openBy" class="text-xs text-gray-500"></span>

                <span id="modalDate" class="text-xs text-gray-500">
                </span>

            </div>

            <div id="modalLabel" class="flex gap-2 mb-3">

            </div>

            <p id="modalDesc" class="text-sm text-gray-600 mb-4">
            </p>

            <div class="bg-gray-100 p-3 rounded flex justify-between text-sm">

                <div>

                    <p class="text-gray-500">
                        Assignee:
                    </p>

                    <p id="modalAuthor"></p>

                </div>

                <div>

                    <p class="text-gray-500">
                        Priority:
                    </p>

                    <p id="modalPriority">
                    </p>

                </div>

            </div>

            <div class="modal-action">

                <form method="dialog">

                    <button class="bg-purple-600 text-white px-4 py-2 rounded border-none cursor-pointer">
                        Close
                    </button>

                </form>

            </div>

        </div>

    </dialog>

    <script>

        const API =
            "https://phi-lab-server.vercel.app/api/v1/lab/issues"

        let allIssues = []
        let currentTab = "all"

        const container =
            document.getElementById("issuesContainer")

        async function loadIssues() {

            showLoader()

            const res = await fetch(API)
            const data = await res.json()

            allIssues = data.data

            renderIssues(allIssues)

        }

        // priority function

        function generatePriority(priority) {

            const p = priority.toUpperCase()

            let style = ""

            if (p === "HIGH") {
                style = "text-red-500 bg-red-100 rounded-lg px-3"
            }

            else if (p === "MEDIUM") {
                style = "text-yellow-500 bg-yellow-100 rounded-lg px-3"
            }

            else {
                style = "text-gray-500 bg-gray-200 rounded-lg px-3"
            }

            return `
<span class="text-xs font-semibold ${style}">
${p}
</span>
`
        }

        // labels function
        function generateLabels(labels) {
            return labels.map(label => {
                if (label.toLowerCase() === "bug") {
                    return `<span class="flex items-center gap-1 px-2.5 py-1 text-xs bg-red-100 text-red-600 px-2 py-1 rounded-lg"><i class="fa-solid fa-virus text-red-600"></i>
       BUG
    </span>`;
                }

                else if (label.toLowerCase() === "help wanted") {
                    return `<span class="flex items-center gap-1 px-2.5 py-1 text-xs bg-yellow-100 text-yellow-600 px-2 py-1 rounded-lg"><i class="fa-solid fa-life-ring text-yellow-600"></i>
      HELP WANTED
    </span>`;
                }
                else if (label.toLowerCase() === "enhancement") {
                    return `<span class="flex items-center gap-1 px-2.5 py-1 text-xs bg-green-100 text-green-600 px-2 py-1 rounded-lg"><i class="fa-solid fa-wand-magic-sparkles text-green-600"></i>
      ENHANCEMENT 
    </span>`;
                }
                else if (label.toLowerCase() === "good first issue") {
                    return `<span class="text-xs bg-indigo-100 text-indigo-400 px-2 py-1 rounded-lg">
      GOOD FIRST ISSUE 
    </span>`;
                }

                return `<span  class="flex items-center gap-1 px-2.5 py-1 text-xs bg-gray-100 text-gray-600 rounded-md"><i class="fa-solid fa-file-lines"></i>
    ${label.toUpperCase()}
  </span>`;
            }).join("");
        }

        function renderIssues(list) {

            container.innerHTML = ""

            document.getElementById("issueCount")
                .innerText = list.length + " Issues"

            list.forEach(issue => {

                const border =
                    issue.status === "open"
                        ? "border-t-4 border-green-500"
                        : "border-t-4 border-purple-500"

                const statusImage =
                    issue.status === "open"
                        ? "./assets/Open-Status.png"
                        : "./assets/Closed-Status.png";

                const card =
                    document.createElement("div")

                card.className =
                    `bg-white py-4 rounded shadow cursor-pointer ${border}`

                const priority = issue.priority.toUpperCase();
                // label
                const labelsHTML = generateLabels(issue.labels)

                card.innerHTML = `

<div class="flex justify-between px-4 mb-2">
    <img src="${statusImage}" class="w-5 h-5" />

${generatePriority(issue.priority)}

</div>

<h3 class="font-semibold text-sm px-4 mb-1">
${issue.title}
</h3>

<p class="text-xs text-gray-500 px-4 mb-3">
${issue.description.slice(0, 70)}...
</p>

<div class="flex gap-2 px-4 mb-3">

${labelsHTML}

</div>
<hr class = "border-1 text-gray-400 my-1">

<div class="flex justify-between px-4 text-right">
  <p class="text-xs text-gray-500">
    #${issue.id} by ${issue.author}
  </p>

  <div>
    <p class="text-xs text-gray-400">
      ${issue.createdAt.split("T")[0]}
    </p>

    <p class="text-xs text-gray-400">
      Updated: ${issue.updatedAt.split("T")[0]}
    </p>
  </div>
</div>

`

                card.onclick = () => openModal(issue)

                container.appendChild(card)

            })

        }

        function changeTab(type) {

            currentTab = type

            setActiveTab()

            let filtered = allIssues

            if (type === "open")
                filtered = allIssues.filter(i => i.status === "open")

            if (type === "closed")
                filtered = allIssues.filter(i => i.status === "closed")

            renderIssues(filtered)

        }

        function setActiveTab() {

            document
                .querySelectorAll(".tabBtn")
                .forEach(btn => {

                    btn.classList.remove(
                        "bg-[#4a00ff]", "text-white"
                    )

                    btn.classList.add("border-1","border-solid","border-gray-300")

                })

            document
                .getElementById(currentTab + "Btn")
                .classList.add(
                    "bg-[#4a00ff]", "text-white"
                )

        }

        async function searchIssues() {

            const q =
                document.getElementById("searchInput").value

            showLoader()

            const res =
                await fetch(
                    `https://phi-lab-server.vercel.app/api/v1/lab/issues/search?q=${q}`
                )

            const data = await res.json()

            renderIssues(data.data)

        }

        function openModal(issue) {

            const status =
                issue.status === "open"
                    ? "bg-green-100 text-green-600 px-2 rounded-lg"
                    : "bg-purple-100 text-purple-600 px-2 rounded-lg"


            document.getElementById("modalTitle").innerText =
                issue.title

            document.getElementById("modalDesc").innerText =
                issue.description

            document.getElementById("openBy").innerText = " • Opened By " + issue.author

            document.getElementById("modalAuthor").innerText =
                issue.author

            document.getElementById("modalPriority").innerHTML =
                generatePriority(issue.priority)

            document.getElementById("modalDate").innerText =
                issue.createdAt.split("T")[0]

            document.getElementById("modalLabel").innerHTML =
                generateLabels(issue.labels)

            document.getElementById("modalStatus").innerText =
                issue.status
            document.getElementById("modalStatus").classList =
                status

            document.getElementById("issueModal").showModal()

        }

        function showLoader() {

            container.innerHTML =

                `<div class="col-span-4 flex justify-center">

<span class="loading loading-spinner loading-xl"></span>

</div>`

        }

        loadIssues()

    </script>

</body>

</html>
